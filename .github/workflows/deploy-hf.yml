name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
        # 1️⃣ Récupérer le code du repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

        # 2️⃣ Configurer Git
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

        # 3️⃣ Ajouter le remote Hugging Face  
      - name: Add Hugging Face remote
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: MarinRama
          SPACE_NAME: futurisys-ml-api
        run: |
          git remote add space https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${SPACE_NAME}
      
      - name: Push to Hugging Face Space
        run: |
          git push --force space main